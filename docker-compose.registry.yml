services:
  homepage-md:
    image: ghcr.io/janmaarten-a11y/homepage-md:latest
    container_name: homepage-md
    ports:
    - "2525:2525"
    volumes:
    - /volume1/docker/homepage-md/bookmarks:/app/bookmarks
    - /volume1/docker/homepage-md/icons:/app/icons:ro
    - /volume1/docker/homepage-md/custom.css:/app/custom.css:ro
    - /volume1/docker/homepage-md/footer.md:/app/footer.md:ro
    - /volume1/docker/homepage-md/themes:/app/themes:ro
    - favicon-cache:/app/favicon-cache
    environment:
    - PORT=2525
    - DEFAULT_PAGE=homepage
    - AUTH_TOKEN=your-passphrase-here
    restart: unless-stopped

volumes:
  favicon-cache: